<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 185" role="img" aria-label="nikhiln64 - Staff engineer at Turo, founding engineer at Otzzi. I build marketplace and platform systems that move real money.">
  <style>
    :root { --fg: #1f2328; --accent: #9a6700; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #e6edf3; --accent: #e3b341; }
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 17px; fill: var(--accent);
      animation: rise 0.5s ease-out both;
    }
    .headline {
      font-family: -apple-system, 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif;
      font-size: 30px; font-weight: 800; letter-spacing: -0.5px; fill: var(--fg);
    }
    .t1 { animation: type 1.1s steps(34, end) 0.5s both; }
    .t2 { animation: type 1.2s steps(40, end) 1.7s both; }
    .caret { fill: var(--accent); opacity: 0; animation: blink 1.1s step-end 0.8s infinite; }
    .bar {
      fill: url(#g); transform: scaleX(0);
      transform-box: fill-box; transform-origin: left;
      animation: draw 0.6s cubic-bezier(0.22, 1, 0.36, 1) 2.9s both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    @keyframes type { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    @keyframes draw { to { transform: scaleX(1); } }
    @media (prefers-reduced-motion: reduce) {
      .t1, .t2, .bar, .mono { animation: none !important; }
      .bar { transform: scaleX(1); }
      .caret { animation: none !important; opacity: 0; }
    }
  </style>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#f78166"/>
    </linearGradient>
  </defs>
  <text class="mono" x="2" y="34">nikhiln64 · Atlanta, Georgia USA</text>
  <rect class="caret" x="336" y="20" width="9" height="19"/>
  <text class="headline t1" x="0" y="88">Staff engineer at Turo, founding engineer at Otzzi.</text>
  <text class="headline t2" x="0" y="128">I build marketplace and platform systems that move real money.</text>
  <rect class="bar" x="2" y="152" width="340" height="5" rx="2.5"/>
</svg>
